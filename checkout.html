            `;
        });

        const baseDate = new Date();

        function getFormattedDate(daysToAdd) {
            const d = new Date(baseDate);
            d.setDate(d.getDate() + daysToAdd);

            return d.toLocaleDateString('en-US', {
                weekday: "long",
                month: "long",
                day: "numeric"
            });
        }

        const formattedDate = getFormattedDate(0);
        const formattedDate1 = getFormattedDate(8);
        const formattedDate2 = getFormattedDate(4);
        const formattedDate3 = getFormattedDate(1);

        document.querySelectorAll('.curr-date')
            .forEach(el => el.innerText = formattedDate);

        document.querySelectorAll('.curr-date1')
            .forEach(el => el.innerText = formattedDate1);

        document.querySelectorAll('.curr-date2')
            .forEach(el => el.innerText = formattedDate2);

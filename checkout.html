    <script src="scripts/cart.js"></script>

    <script>

        const Cart = JSON.parse(localStorage.getItem("cart")) || [];
        const Container = document.getElementById("cart-container");

        document.querySelector('.return-to-home-link').innerText = `${Cart.length} items`;
        document.querySelector('.itemsquant').innerText = `Items (${Cart.length}) :`

        function updatePaymentSummary() {
            let total = 0;
            let shipping = 0;
            Cart.forEach((item,index) => {
                const price = Number(item.price.replace("₹", ""));
                total += price * item.quantity;

                const selected = document.querySelector(`input[name="delivery-option-${index}"]:checked`);

                if (selected) {
                    shipping += Number(selected.dataset.cost);
                }
            });

            const tax = total * 0.1;

            const finalTotal = total + tax + shipping;

            document.getElementById("items-price").innerText = `₹${total}`;
            document.getElementById("subtotal").innerText = `₹${total}`;
            document.getElementById("tax").innerText = `₹${tax.toFixed(2)}`;
            document.getElementById("total").innerText = `₹${finalTotal.toFixed(2)}`;

            document.querySelectorAll(".payment-summary-money")[1].innerText = `₹${shipping}`;
        }

        Container.innerHTML = "";

        Cart.forEach((item, index) => {
            Container.innerHTML +=
                `
                <div class="cart-item-container">
                    <div class="delivery-date">
                        Delivery date: <span class="curr-date"></span>
                    </div>
                    <div class="cart-item-details-grid">
                        <img class="product-image" src="${item.image}" />

                        <div class="cart-item-details">
                            <div class="product-name">${item.name}</div>
                            <div class="product-price">${item.price}</div>
                            <div class="product-quantity">
                                <span>
                                    Quantity: <span class="quantity-label">${item.quantity}</span>
                                </span>
                                <span class="update-quantity-link link-primary" onclick="location.href='index.html'">
                                    Update
                                </span>
                                <span class="delete-quantity-link link-primary" data-index=${index}>
                                    Delete
                                </span>
                            </div>
                        </div>

                        <div class="delivery-options">
                            <div class="delivery-options-title">
                                Choose a delivery option:
                            </div>
                            <div class="delivery-option">
                                <input checked type="radio" class="delivery-option-input" name="delivery-option-${index}" data-cost="0"/>
                                <div>
                                    <div class="delivery-option-date">
                                        <span class="curr-date1"></span>
                                    </div>
                                    <div class="delivery-option-price">
                                        FREE Shipping
                                    </div>
                                </div>
                            </div>
                            <div class="delivery-option">
                                <input type="radio" class="delivery-option-input" name="delivery-option-${index}" data-cost="449"/>
                                <div>
                                    <div class="delivery-option-date">
                                        <span class="curr-date2"></span>
                                    </div>
                                    <div class="delivery-option-price">
                                        ₹449 - Shipping
                                    </div>
                                </div>
                            </div>
                            <div class="delivery-option">
                                <input type="radio" class="delivery-option-input" name="delivery-option-${index}" data-cost="899"/>
                                <div>
                                    <div class="delivery-option-date">
                                        <span class="curr-date3"></span>
                                    </div>
                                    <div class="delivery-option-price">
                                        ₹899 - Shipping
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        updatePaymentSummary();

        const baseDate = new Date();

        function getFormattedDate(daysToAdd) {
            const d = new Date(baseDate);
            d.setDate(d.getDate() + daysToAdd);

            return d.toLocaleDateString('en-US', {
                weekday: "long",
                month: "long",
                day: "numeric"
            });
        }

        const formattedDate = getFormattedDate(8);
        const formattedDate1 = getFormattedDate(8);
        const formattedDate2 = getFormattedDate(4);
        const formattedDate3 = getFormattedDate(1);

        document.querySelectorAll('.curr-date')
            .forEach(el => el.innerText = formattedDate);

        document.querySelectorAll('.curr-date1')
            .forEach(el => el.innerText = formattedDate1);

        document.querySelectorAll('.curr-date2')
            .forEach(el => el.innerText = formattedDate2);

        document.querySelectorAll('.curr-date3')
            .forEach(el => el.innerText = formattedDate3);

        document.getElementById("cart-container").addEventListener('click', (e) => {
            if (e.target.classList.contains("delete-quantity-link")) {
                const index = e.target.dataset.index;
                let cart = JSON.parse(localStorage.getItem("cart")) || [];

                cart.splice(index, 1);

                localStorage.setItem("cart", JSON.stringify(cart));

                location.reload();
            }
        });

        document.getElementById("cart-container").addEventListener('change', (e) => {
            if (e.target.classList.contains("delivery-option-input")) {
                const productContainer = e.target.closest(".cart-item-container");
                const deliveryText = e.target.parentElement.querySelector(".delivery-option-date span").innerText;
                productContainer.querySelector(".curr-date").innerText = deliveryText;

                updatePaymentSummary();
            }
        })


    </script>

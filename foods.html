<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Items</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="header">
        <div class="left-section">
            <a href="index.html" class="header-link">
                <img src="logo.png" class="logo" alt="logo">
            </a>
        </div>

        <div class="middle-section">
            <input type="text" class="search-bar" placeholder="Search">

            <button class="search-button">
                <img src="icons/search-icon.png" class="search-icon">
            </button>
        </div>

        <div class="right-section">
            <a href="orders.html" class="orders-link header-link">
                <span class="orders-text">Orders</span>
            </a>

            <a href="checkout.html" class="cart-link header-link">
                <img src="icons/cart-icon.png" class="cart-icon">
                <div class="cart-quantity">2</div>
                <div class="cart-text">Cart</div>
            </a>
        </div>
    </div>

    <div class="products">
        <div class="products-grid" id="product-container">
            
        </div>
    </div>

    <script src="scripts/products.js"></script>
    <script src="scripts/cart.js"></script>

    <script>
        renderProducts("foods");
    </script>
</body>

</html>
